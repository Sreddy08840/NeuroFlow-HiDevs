name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install tooling
        run: pip install ruff mypy
      - name: Apply fixable ruff fixes
        run: ruff check backend/ --fix --unsafe-fixes || true
      - name: Commit ruff fixes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: apply ruff --unsafe-fixes from CI" || echo "no changes to commit"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
      - name: Lint with ruff (fail on remaining issues)
        run: ruff check backend/
      - name: Type check with mypy
        run: mypy backend/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_PASSWORD: testpassword, POSTGRES_DB: neuroflow_test }
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r backend/requirements.txt
      - run: pytest tests/ -v --cov=backend --cov-report=xml
      - uses: codecov/codecov-action@v4
        with: { file: coverage.xml }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: pip install detect-secrets pip-audit
      - run: detect-secrets-hook --baseline .secrets.baseline $(git diff --name-only HEAD~1) || true
      - run: pip-audit -r backend/requirements.txt
      - run: npm ci --prefix frontend
      - run: npm audit --prefix frontend --audit-level=high
