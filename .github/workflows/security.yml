name: Security Scan

on:
  push:
    branches: [ main ]

jobs:
  scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker compose -f infra/docker-compose.prod.yml build api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: neuroflow-api:latest
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
