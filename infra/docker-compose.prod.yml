services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: neuroflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuroflow}
      POSTGRES_DB: neuroflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    restart: unless-stopped

  api:
    build:
      context: ../backend
      target: runtime
    environment:
      DATABASE_URL: postgresql://neuroflow:${POSTGRES_PASSWORD:-neuroflow}@postgres:5432/neuroflow
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL

  worker:
    build:
      context: ../backend
      target: runtime
    command: python -m worker
    environment:
      DATABASE_URL: postgresql://neuroflow:${POSTGRES_PASSWORD:-neuroflow}@postgres:5432/neuroflow
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2g
          cpus: "2.0"  # Workers need more for ML models
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      target: runtime
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
